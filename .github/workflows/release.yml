name: Build OBS overlay bundle

# Renders every overlay, transcodes the transparent ones to HEVC-alpha, packages
# the dated OBS bundle (release.sh), and attaches the zip to the GitHub Release.
#
# macOS runner is REQUIRED: to-hevc.sh encodes HEVC-with-alpha via
# hevc_videotoolbox, which only exists on Apple platforms (no Linux equivalent).

on:
  release:
    types: [published]
  workflow_dispatch: {}   # manual run — builds + uploads an artifact, no release asset

permissions:
  contents: write         # upload the zip as a release asset

jobs:
  bundle:
    runs-on: macos-14     # Apple Silicon — has VideoToolbox
    # Measured on a real run: renders ~85 min + SOFTWARE HEVC transcodes
    # (no HW encoder in the VM) ~65 min for countdown+loading-barks ≈ 155 min.
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false  # job never pushes; upload uses GH_TOKEN env

      # node 24 = what generates package-lock.json locally; npm 10 (node 20)
      # rejects the npm-11 lockfile layout for bundled wasm deps (@emnapi/*).
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: remotion/package-lock.json

      # npm install, NOT npm ci: npm's lock validation of bundled wasm deps
      # (@tailwindcss/oxide-wasm32-wasi -> @emnapi/*) breaks across npm
      # versions — npm ci fails "Missing @emnapi/core from lock file" no
      # matter which npm generated the lock.
      - name: Install remotion deps
        run: npm install --no-audit --no-fund
        working-directory: remotion

      - name: Ensure ffmpeg + Pillow
        run: |
          ffmpeg -version >/dev/null 2>&1 || brew install ffmpeg
          python3 -m pip install --user --quiet pillow || true

      - name: Render + package bundle
        run: ./release.sh --force

      - name: Locate bundle
        id: bundle
        run: echo "zip=$(ls "$HOME/Downloads/OBS-overlays-"*.zip | head -1)" >> "$GITHUB_OUTPUT"

      # Manual/dispatch runs: keep the zip as a workflow artifact.
      - uses: actions/upload-artifact@v4
        with:
          name: obs-overlay-bundle
          path: ${{ steps.bundle.outputs.zip }}
          if-no-files-found: error

      # Release runs: attach the zip to the published release.
      - name: Attach to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" "${{ steps.bundle.outputs.zip }}" --clobber
